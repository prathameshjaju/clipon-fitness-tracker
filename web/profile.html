<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse — Setup Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="profile-container">
    <div class="profile-header">
      <div class="big-icon">💓</div>
      <h2>Set Up Your Profile</h2>
      <p>We use this to calculate your calories burned and personalise your fitness data.</p>
    </div>

    <form id="profileForm">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="name" placeholder="e.g. Prathamesh" required>
      </div>

      <div class="form-group">
        <label>Age</label>
        <input type="number" id="age" placeholder="e.g. 24" min="10" max="100" required>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select id="gender" required>
          <option value="" disabled selected>Select gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g. 70" min="30" max="200" required>
      </div>

      <div class="form-group">
        <label>Height (cm)</label>
        <input type="number" id="height" placeholder="e.g. 175" min="100" max="250" required>
      </div>

      <div class="form-group">
        <label>Daily Step Goal</label>
        <select id="stepGoal">
          <option value="5000">5,000 steps — Light</option>
          <option value="8000" selected>8,000 steps — Moderate</option>
          <option value="10000">10,000 steps — Active</option>
          <option value="15000">15,000 steps — Very Active</option>
        </select>
      </div>

      <button type="submit" class="btn-save">Save & Continue →</button>
    </form>
  </div>

  <script>
    // Pre-fill if profile exists
    window.addEventListener('load', () => {
      const p = JSON.parse(localStorage.getItem('pulse_profile') || '{}');
      if (p.name)     document.getElementById('name').value     = p.name;
      if (p.age)      document.getElementById('age').value      = p.age;
      if (p.gender)   document.getElementById('gender').value   = p.gender;
      if (p.weight)   document.getElementById('weight').value   = p.weight;
      if (p.height)   document.getElementById('height').value   = p.height;
      if (p.stepGoal) document.getElementById('stepGoal').value = p.stepGoal;
    });

    document.getElementById('profileForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const profile = {
        name:     document.getElementById('name').value,
        age:      parseInt(document.getElementById('age').value),
        gender:   document.getElementById('gender').value,
        weight:   parseFloat(document.getElementById('weight').value),
        height:   parseFloat(document.getElementById('height').value),
        stepGoal: parseInt(document.getElementById('stepGoal').value),
        // Calculated stride length
        strideLength: parseFloat(document.getElementById('height').value) * 0.414 / 100 // in meters
      };

      localStorage.setItem('pulse_profile', JSON.stringify(profile));
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
